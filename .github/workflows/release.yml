name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers the workflow on version tags like v1.0.0

permissions:
  contents: write  # Ensure the workflow has write permissions for contents

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Zip files
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        mkdir release
        cp AutoTheme.ps1 release/
        cp config.ps1 release/
        cp setup.ps1 release/
        cp autotheme.png release/
        cp LICENSE release/
        cp README.md release/
        zip -r "release-$TAG_NAME.zip" release/

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          Release notes for ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release-$TAG_NAME.zip
        asset_name: release-$TAG_NAME.zip
        asset_content_type: application/zip

